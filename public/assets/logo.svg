<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left lobe of the heart (teal): sweeps from top-left, curves down through center. -->
  <path
    d="M 32 22 C 27 12, 17 8, 12 14 C 5 22, 8 34, 22 44 C 27 47, 30 49, 32 50 C 34 49, 37 47, 42 44"
    stroke="#1FAE9A" stroke-width="5.2" />
  <!-- Right lobe (navy): mirrors the left, meets at center. -->
  <path
    d="M 32 22 C 37 12, 47 8, 52 14 C 59 22, 56 34, 42 44 C 37 47, 34 49, 32 50 C 30 49, 27 47, 22 44"
    stroke="#0B1F3A" stroke-width="5.2" />
  <!-- Interlink chain: two small links that "hook" the two lobes together at the meeting point. -->
  <g transform="translate(32 38) rotate(45)">
    <rect x="-11" y="-3.6" width="12" height="7.2" rx="3.6" stroke="#1FAE9A" stroke-width="2" />
    <rect x="-1"  y="-3.6" width="12" height="7.2" rx="3.6" stroke="#0B1F3A" stroke-width="2" />
  </g>
</svg>
