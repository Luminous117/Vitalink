<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome · VitaLink</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="/assets/theme.js"></script>
  <script src="/assets/mobile-nav.js" defer></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js" defer></script>
</head>
<body>

<div class="onboard-wrap">
  <div class="onboard-card fade-in">
    <a href="/" class="brand">
      <img src="/assets/logo.svg" alt="VitaLink" />
      <span>VitaLink</span>
    </a>
    <lottie-player class="lottie-hello" src="/lotties/hello.json" background="transparent" speed="1" loop autoplay></lottie-player>
    <div class="progress-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <h1 data-i18n="onboard.title">Welcome to your health hub.</h1>
    <p data-i18n="onboard.subtitle">Create an account in under a minute. No credit card required.</p>

    <div id="signup-error" style="display:none; background:#fde8e8; color:#8a2020; padding:12px 14px; border-radius:12px; font-size:13.5px; margin-bottom:16px; text-align:left;"></div>

    <form class="onboard-form" id="signup-form">
      <div class="field">
        <label for="name">Your name</label>
        <input id="name" type="text" placeholder="Rohit Mahajan" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="pass">Create a passphrase</label>
        <input id="pass" type="password" placeholder="At least 12 characters" required minlength="12" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:12px;">Create account →</button>
    </form>

    <p class="legal" style="margin-top:20px;">
      Just here to look around?
      <a href="/pages/dashboard.html">Open the demo — no signup →</a>
    </p>
    <p class="legal" style="margin-top:8px;">
      Already have an account?
      <a href="/pages/signin.html">Sign in</a>
    </p>
    <p class="legal" style="margin-top:12px;">
      By continuing, you agree to VitaLink's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    </p>
  </div>
</div>

<script src="/assets/auth.js"></script>
<script src="/assets/i18n.js"></script>
<script>
  document.getElementById('signup-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var errBox = document.getElementById('signup-error');
    errBox.style.display = 'none';
    var res = window.VitalinkAuth.signUp({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      passphrase: document.getElementById('pass').value,
    });
    if (!res.ok) {
      errBox.textContent = res.error;
      errBox.style.display = 'block';
      return;
    }
    // Success flash: play the checkmark animation, then redirect.
    var flash = document.createElement('div');
    flash.className = 'success-flash is-on';
    flash.innerHTML =
      '<lottie-player src="/lotties/success.json" background="transparent" speed="1" autoplay></lottie-player>' +
      "<h3>You're all set!</h3>" +
      '<p>Setting up your health hub…</p>';
    document.body.appendChild(flash);
    setTimeout(function () { window.location = '/pages/dashboard.html'; }, 1500);
  });
</script>
</body>
</html>
