<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Records · VitaLink</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="/assets/theme.js"></script>
</head>
<body>

<div class="app-shell">
  <aside class="sidebar" id="side"></aside>
  <main class="main">
    <div class="main-inner">

      <div class="topbar fade-in">
        <div class="topbar-head">
          <h1>Health records</h1>
          <p>Every lab, visit, prescription, and imaging report in one place.</p>
        </div>
        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input placeholder="Search records…" data-search="records-filter" />
        </div>
      </div>

      <div class="chips fade-in d1">
        <button class="chip active">All</button>
        <button class="chip">Labs</button>
        <button class="chip">Prescriptions</button>
        <button class="chip">Imaging</button>
        <button class="chip">Visit notes</button>
        <button class="chip">Immunizations</button>
      </div>

      <div class="panel fade-in d2" data-records="list">
        <!-- rendered by records-data.js -->
      </div>
      <p style="text-align:center;color:var(--text-muted);font-size:12.5px;margin-top:16px;">
        Tap any record to view its full details.
      </p>

    </div>
  </main>
</div>

<script src="/assets/i18n.js"></script>
<script src="/assets/app.js"></script>
<script src="/assets/records-data.js"></script>
</body>
</html>
